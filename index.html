<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <title>Cofre secreto</title>
</head>
<body>
   <div class="container">
    <h2>Qual é a Senha?</h2>

    <div class="enigma">
        <p>🔒 Enigma:  
        🐱 | 🍂 | 🔷 | 🚲 <br>  
        "Quatro elementos guardam o segredo. Qual é a sequência correta?"  </p>
    </div>

    <div class="input-area">
        <input type="text" id="senha" placeholder="Digite a senha">
        <button id="bnt">Tentar</button>
    </div>

    <div class="dicas">
        <button id="d1">Dica 1</button>
        <button id="d2" disabled>Dica 2</button>
        <button id="d3" disabled>Dica 3</button>
        <button id="desistir">Desistir</button>
    </div>

    <div id="mensagem"></div>
</div>
   <script src="script.js"></script>
</body>

</html>
